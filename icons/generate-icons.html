<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SolarPro Icon Generator</title>
<style>
  body { font-family: sans-serif; padding: 24px; background: #111; color: #fff; }
  canvas { border: 1px solid #333; margin: 8px; }
  button { padding: 12px 24px; background: #F97316; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 16px; }
  h2 { color: #F97316; }
  .row { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
  label { font-size: 12px; color: #aaa; display: block; text-align: center; }
</style>
</head>
<body>
<h1>SolarPro Icon Generator</h1>
<p>Click <b>Generate &amp; Download All</b> — 4 PNG files will download automatically. Move them to the <code>icons/</code> folder.</p>
<div class="row">
  <div><canvas id="main-192" width="192" height="192"></canvas><label>icon-192.png</label></div>
  <div><canvas id="main-512" width="512" height="512"></canvas><label>icon-512.png</label></div>
  <div><canvas id="crm-192" width="192" height="192"></canvas><label>icon-crm-192.png</label></div>
  <div><canvas id="crm-512" width="512" height="512"></canvas><label>icon-crm-512.png</label></div>
</div>
<button onclick="downloadAll()">Generate &amp; Download All</button>

<script>
function drawIcon(canvas, bgColor, hexColor, textColor, size) {
  const ctx = canvas.getContext('2d');
  const w = size, h = size;
  const cx = w / 2, cy = h / 2;
  const r = w * 0.38;

  // Background
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, w, h);

  // Hexagon
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i - 30);
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = hexColor;
  ctx.fill();

  // "S" letter
  const fontSize = Math.round(w * 0.3);
  ctx.font = `bold ${fontSize}px Arial, sans-serif`;
  ctx.fillStyle = textColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', cx, cy + fontSize * 0.04);
}

function download(canvas, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function downloadAll() {
  const configs = [
    { id: 'main-192', size: 192, bg: '#071B3A', hex: '#F97316', text: '#ffffff', name: 'icon-192.png' },
    { id: 'main-512', size: 512, bg: '#071B3A', hex: '#F97316', text: '#ffffff', name: 'icon-512.png' },
    { id: 'crm-192',  size: 192, bg: '#0d1c32', hex: '#C2560B', text: '#ffffff', name: 'icon-crm-192.png' },
    { id: 'crm-512',  size: 512, bg: '#0d1c32', hex: '#C2560B', text: '#ffffff', name: 'icon-crm-512.png' },
  ];

  configs.forEach(c => {
    const canvas = document.getElementById(c.id);
    drawIcon(canvas, c.bg, c.hex, c.text, c.size);
  });

  // Stagger downloads so browser doesn't block them
  configs.forEach((c, i) => {
    setTimeout(() => download(document.getElementById(c.id), c.name), i * 300);
  });
}

// Preview on load
window.onload = () => {
  const configs = [
    { id: 'main-192', size: 192, bg: '#071B3A', hex: '#F97316', text: '#ffffff' },
    { id: 'main-512', size: 512, bg: '#071B3A', hex: '#F97316', text: '#ffffff' },
    { id: 'crm-192',  size: 192, bg: '#0d1c32', hex: '#C2560B', text: '#ffffff' },
    { id: 'crm-512',  size: 512, bg: '#0d1c32', hex: '#C2560B', text: '#ffffff' },
  ];
  configs.forEach(c => drawIcon(document.getElementById(c.id), c.bg, c.hex, c.text, c.size));
};
</script>
</body>
</html>
